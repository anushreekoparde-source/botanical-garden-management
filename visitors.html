<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitors - Botanical Garden</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body" data-page="visitors">

    <aside class="sidebar">
        <div class="sidebar-brand">🌿 Botanical CMS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="plants.html">🍃 Plants</a></li>
            <li><a href="staff.html">👥 Staff</a></li>
            <li><a href="visitors.html" class="active">🎟️ Visitors</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>Manage Visitors</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </header>

        <div class="data-table-card">
            <div class="table-header">
                <h3>Visitor Logs</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-add" id="buyBtn" style="background: var(--primary-light);">🛍️ Buy Plant</button>
                    <button class="btn-add" id="addBtn">+ Add Visitor</button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>Visit Date</th><th>Contact</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="5" style="text-align:center">Loading visitors...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Visitor</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="recordForm">
                <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                <div class="form-group"><label>Visit Date</label><input type="date" name="visit_date" required></div>
                <div class="form-group"><label>Contact</label><input type="text" name="contact" required></div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn-add">Save changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Buy Plant Modal -->
    <div class="modal" id="buyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Plant Marketplace</h3>
                <button class="modal-close" id="closeBuyModal">&times;</button>
            </div>
            <form id="buyForm">
                <div class="form-group">
                    <label>Select Visitor</label>
                    <select name="visitor_id" id="buyVisitorSelect" required>
                        <option value="">-- Choose a Visitor --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Plant</label>
                    <select name="plant_id" id="buyPlantSelect" required>
                        <option value="">-- Choose a Plant --</option>
                    </select>
                </div>
                <div id="plantDetails" style="display: none;">
                    <div class="form-group">
                        <label>Available Stock:</label>
                        <div id="buyAvailableStock" style="color: var(--accent); font-weight: 600;"></div>
                    </div>
                    <div class="form-group">
                        <label>Unit Price:</label>
                        <div id="buyUnitPrice" style="color: var(--text-muted);"></div>
                    </div>
                    <div class="form-group">
                        <label>Quantity to Buy</label>
                        <input type="number" name="buyQuantity" id="buyQuantity" min="1" value="1" required>
                    </div>
                    <div class="total-price-display" style="margin: 20px 0; padding: 15px; background: rgba(82, 183, 136, 0.1); border-radius: 8px; border: 1px dashed var(--accent); text-align: center;">
                        <span style="font-size: 14px; color: var(--text-muted);">Total Price:</span>
                        <div id="buyTotalPrice" style="font-size: 24px; font-weight: 700; color: var(--accent);">₹0.00</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBuyModal">Cancel</button>
                    <button type="submit" class="btn-add" id="confirmBuyBtn" disabled>Confirm Purchase</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
