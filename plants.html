<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plants - Botanical Garden </title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body" data-page="plants">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-brand">🌿 Botanical CMS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="plants.html" class="active">🍃 Plants</a></li>
            <li><a href="staff.html">👥 Staff</a></li>
            <li><a href="visitors.html">🎟️ Visitors</a></li>
        </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="topbar">
            <h1>Manage Plants</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </header>

        <div class="data-table-card">
            <div class="table-header">
                <h3>Plant Inventory</h3>
                <button class="btn-add" id="addBtn">+ Add Plant</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">Image</th><th>ID</th><th>Name</th><th>Scientific Name</th><th>Category</th><th>Qty</th><th>Price</th><th>Location</th><th>Date</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="8" style="text-align:center">Loading plants...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Plant</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="recordForm">
                <div class="form-group">
                    <label>Plant Image (JPG/PNG)</label>
                    <input type="file" name="image" id="imageInput" accept=".jpg, .jpeg, .png">
                    <div style="margin-top:10px; text-align:center;">
                        <img id="imagePreview" alt="Image Preview" style="display:none; max-width: 100px; max-height: 100px; border-radius: 8px; border: 1px solid var(--primary); object-fit: cover;">
                    </div>
                </div>
                <div class="form-group"><label>Plant Name</label><input type="text" name="name" id="nameInput" required></div>
                <div class="form-group"><label>Scientific Name</label><input type="text" name="scientific_name" required></div>
                <div class="form-group"><label>Category</label><input type="text" name="category" required></div>
                <div class="form-group"><label>Quantity</label><input type="number" name="quantity" required></div>
                <div class="form-group"><label>Price (per unit)</label><input type="number" step="0.01" name="price" required></div>
                <div class="form-group"><label>Location</label><input type="text" name="location" required></div>
                <div class="form-group"><label>Date Added</label><input type="date" name="date_added" required></div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn-add">Save changes</button>
                </div>
            </form>
        </div>
    </div>


    <script src="js/app.js"></script>
</body>
</html>
