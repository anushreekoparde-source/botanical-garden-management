<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Botanical Garden</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body" data-page="staff">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-brand">🌿 Botanical CMS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="plants.html">🍃 Plants</a></li>
            <li><a href="staff.html" class="active">👥 Staff</a></li>
            <li><a href="visitors.html">🎟️ Visitors</a></li>
        </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="topbar">
            <h1>Manage Staff</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </header>

        <div class="data-table-card">
            <div class="table-header">
                <h3>Staff List</h3>
                <button class="btn-add" id="addBtn">+ Add Staff</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>Role</th><th>Contact</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="5" style="text-align:center">Loading staff...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Staff</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="recordForm">
                <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                <div class="form-group"><label>Role</label><input type="text" name="role" required></div>
                <div class="form-group"><label>Contact</label><input type="text" name="contact" required></div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn-add">Save changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
