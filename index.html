<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Botanical Garden Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-overlay"></div>
    <div class="login-container">
        <div class="login-glass">
            <div class="login-header">
                <h2>Botanical Garden</h2>
                <p>Management System</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="btn-primary login-btn">Secure Login</button>
            </form>
        </div>
    </div>

    <script>
        // Login bypassed — redirect straight to dashboard
        window.location.href = 'dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.opacity = 1;
                }
            } catch (err) {
                errorDiv.textContent = "Server error. Try again.";
                errorDiv.style.opacity = 1;
            }
        });
    </script>
</body>
</html>
